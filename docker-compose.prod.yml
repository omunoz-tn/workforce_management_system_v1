services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: workforce-platform:latest
    container_name: workforce_app
    restart: unless-stopped
    ports:
      - "3002:80"
    env_file:
      - .env.production
    volumes:
      - ./.env.production:/var/www/.env:ro
    networks:
      - workforce_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  workforce_net:
    name: workforce_net
    driver: bridge
